<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 2.2</title>

    <!-- Local Bootstrap CSS -->
    <link rel="stylesheet" href="CSS/bootstrap.min.css">
</head>

<body>

<div class="container mt-5">

    <h2 class="mb-3">Bootstrap Collapse Example</h2>

    <button class="btn btn-primary"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#demo">

        Show / Hide Content

    </button>

    <div class="collapse mt-3" id="demo">

        <div class="card card-body">

            Congratulations! Bootstrap JavaScript is working successfully.

        </div>

    </div>

</div>

<!-- Local Bootstrap JavaScript -->
<script src="js/bootstrap.bundle.min.js"></script>

</body>
</html>
