<!DOCTYPE html>

    <title>Exercise 7 - Table Styling</title>

    <link rel="stylesheet" href="styles.css">

</head>

<body>

    <h1>Local Community Event Portal</h1>

    <h2>Event Schedule</h2>

    <table>

        <tr>
            <th>Event</th>
            <th>Date</th>
            <th>Venue</th>
        </tr>

        <tr>
            <td>Music Festival</td>
            <td>20 June</td>
            <td>City Park</td>
        </tr>

        <tr>
            <td>Food Carnival</td>
            <td>22 June</td>
            <td>Main Ground</td>
        </tr>

        <tr>
            <td>Book Fair</td>
            <td>25 June</td>
            <td>Community Hall</td>
        </tr>

        <tr>
            <td>Art Exhibition</td>
            <td>28 June</td>
            <td>Town Gallery</td>
        </tr>

    </table>

</body>
</html>
