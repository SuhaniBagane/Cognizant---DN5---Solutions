<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 8 - Box Model and Layout</title>

    <link rel="stylesheet" href="styles.css">

</head>

<body>

    <h1>Local Community Event Portal</h1>

    <div class="eventCard">

        <h2>Music Festival</h2>

        <p>
            Enjoy live music performances with family and friends.
        </p>

    </div>

    <div class="eventCard">

        <h2>Food Carnival</h2>

        <p>
            Taste delicious food from different regions.
        </p>

    </div>

    <h2>Registration Form</h2>

    <form>

        <input type="text" placeholder="Enter your Name">

        <br><br>

        <input type="email" placeholder="Enter your Email">

        <br><br>

        <input type="submit" value="Register">

    </form>

    <div class="hiddenBox">
        This box demonstrates visibility: hidden;
    </div>

    <div class="noneBox">
        This box demonstrates display: none;
    </div>

</body>
</html>
