<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Image Gallery</title>

    <style>

        .galleryImage{
            border:3px solid black;
            width:180px;
            height:120px;
        }

        table{
            margin:auto;
        }

        caption{
            font-size:22px;
            font-weight:bold;
            margin-bottom:10px;
        }

        td{
            padding:10px;
            text-align:center;
        }

    </style>

</head>

<body>

    <table>

        <caption>Community Events Gallery</caption>

        <tr>

            <td>
                <img src="https://picsum.photos/200/120?random=1"
                     alt="Music Festival"
                     title="Music Festival"
                     class="galleryImage">
                <br>
                Music Festival
            </td>

            <td>
                <img src="https://picsum.photos/200/120?random=2"
                     alt="Food Carnival"
                     title="Food Carnival"
                     class="galleryImage">
                <br>
                Food Carnival
            </td>

            <td>
                <img src="https://picsum.photos/200/120?random=3"
                     alt="Book Fair"
                     title="Book Fair"
                     class="galleryImage">
                <br>
                Book Fair
            </td>

        </tr>

        <tr>

            <td>
                <img src="https://picsum.photos/200/120?random=4"
                     alt="Art Exhibition"
                     title="Art Exhibition"
                     class="galleryImage">
                <br>
                Art Exhibition
            </td>

            <td>
                <img src="https://picsum.photos/200/120?random=5"
                     alt="Health Camp"
                     title="Health Camp"
                     class="galleryImage">
                <br>
                Health Camp
            </td>

            <td>
                <img src="https://picsum.photos/200/120?random=6"
                     alt="Sports Meet"
                     title="Sports Meet"
                     class="galleryImage">
                <br>
                Sports Meet
            </td>

        </tr>

    </table>

</body>

</html>
